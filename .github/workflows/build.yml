name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore WallpaperManager.sln

      - name: Build
        run: dotnet build WallpaperManager.sln -c Release --no-restore

      - name: Publish Framework-Dependent
        run: |
          dotnet publish WallpaperManager.csproj `
            -c Release `
            -o ./publish/fdd `
            --self-contained false

      - name: Publish Self-Contained (win-x64)
        run: |
          dotnet publish WallpaperManager.csproj `
            -c Release `
            -r win-x64 `
            -o ./publish/win-x64 `
            --self-contained true

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./publish/fdd/WallpaperManager.exe
            ./publish/win-x64/WallpaperManager.exe
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release Asset (Framework-Dependent)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: ./publish/fdd/*
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release Asset (Self-Contained)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: ./publish/win-x64/*
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and Push
        run: |
          git tag v1.0.0
          git push origin v1.0.0